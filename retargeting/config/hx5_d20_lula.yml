# The robot description defines the generalized coordinates and how to map those
# to the underlying URDF dofs.

api_version: 1.0

# Defines the generalized coordinates. Each generalized coordinate is assumed
# to have an entry in the URDF.
# Lula will only use these joints to control the robot position.
cspace:
    # - left_wheel_steer
    - lift_joint
    # - rear_wheel_steer
    # - right_wheel_steer
    # - left_wheel_drive
    - arm_l_joint1
    - arm_r_joint1
    - head_joint1
    # - rear_wheel_drive
    # - right_wheel_drive
    - arm_l_joint2
    - arm_r_joint2
    - head_joint2
    - arm_l_joint3
    - arm_r_joint3
    - arm_l_joint4
    - arm_r_joint4
    - arm_l_joint5
    - arm_r_joint5
    - arm_l_joint6
    - arm_r_joint6
    - arm_l_joint7
    - arm_r_joint7
    - finger_l_joint1
    - finger_l_joint13
    - finger_l_joint17
    - finger_l_joint5
    - finger_l_joint9
    - finger_r_joint1
    - finger_r_joint13
    - finger_r_joint17
    - finger_r_joint5
    - finger_r_joint9
    - finger_l_joint2
    - finger_l_joint14
    - finger_l_joint18
    - finger_l_joint6
    - finger_l_joint10
    - finger_r_joint2
    - finger_r_joint14
